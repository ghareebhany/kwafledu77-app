name: Flutter – Build Release APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build & Upload Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.1'
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Cache pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: flutter pub get
        run: flutter pub get

      - name: Flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

      - name: Build release APK
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          flutter build apk --release \
            --obfuscate \
            --split-debug-info=build/debug-info \
            --dart-define=SITE_URL=${SITE_URL:-https://kwafledu.com}

      - name: Collect APK
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/kwafledu-release-${{ github.sha }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kwafledu-apk-${{ github.run_number }}
          path: dist/kwafledu-release-*.apk
          retention-days: 14

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: kwafledu-debug-info-${{ github.run_number }}
          path: build/debug-info/
          retention-days: 90

      - name: APK size summary
        run: |
          echo "### APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          du -sh dist/*.apk | while read size file; do
            echo "| $(basename $file) | $size |" >> $GITHUB_STEP_SUMMARY
          done
