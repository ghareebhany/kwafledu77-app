name: kwafledu_app
description: KwafLEdu – Arabic LMS Flutter App connected to Tutor LMS via JWT
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── HTTP & Networking ─────────────────────────────────────────────────────
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1

  # ── Secure Storage (JWT token + nonce) ───────────────────────────────────
  flutter_secure_storage: ^9.0.0

  # ── Video Player ──────────────────────────────────────────────────────────
  video_player: ^2.8.7
  chewie: ^1.7.5
  webview_flutter: ^4.7.0
  youtube_player_iframe: ^5.2.2

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^13.2.1

  # ── UI & Fonts ────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_html: ^3.0.0-beta.2
  intl: ^0.19.0

  # ── Local Persistence ─────────────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ── Functional Programming ───────────────────────────────────────────────
  dartz: ^0.10.1

  # ── Value Equality ────────────────────────────────────────────────────────
  equatable: ^2.0.5

  # ── Connectivity ──────────────────────────────────────────────────────────
  connectivity_plus: ^6.0.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  mocktail: ^1.0.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
